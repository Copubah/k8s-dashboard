apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend
  namespace: k8s-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-backend
  template:
    metadata:
      labels:
        app: dashboard-backend
    spec:
      serviceAccountName: k8s-dashboard
      containers:
        - name: backend
          image: k8s-dashboard-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: IN_CLUSTER
              value: "true"
            - name: K8S_NAMESPACE
              value: ""
            - name: DASHBOARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dashboard-auth
                  key: username
            - name: DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashboard-auth
                  key: password
            - name: ALLOWED_ORIGIN
              value: http://localhost:5173
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-backend
  namespace: k8s-dashboard
spec:
  selector:
    app: dashboard-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
