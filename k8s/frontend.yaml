apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  namespace: k8s-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-frontend
  template:
    metadata:
      labels:
        app: dashboard-frontend
    spec:
      containers:
        - name: frontend
          image: k8s-dashboard-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-frontend
  namespace: k8s-dashboard
spec:
  selector:
    app: dashboard-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
